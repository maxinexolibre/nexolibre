name: Agente de oportunidades (eBay)

on:
  schedule:
    - cron: "0 11 * * *"   # todos los días ~08:00 Argentina (11:00 UTC)
  workflow_dispatch: {}      # permite correrlo a mano desde la pestaña Actions

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Buscar oportunidades en eBay
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
        run: python3 tools/market_agent/ebay_scan.py

      - name: Guardar candidatos como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: candidatos
          path: tools/market_agent/out/*.json
          if-no-files-found: warn
          retention-days: 14
